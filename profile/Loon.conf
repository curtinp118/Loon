# @Tips            注释行默认不生效，去掉开头注释符后生效

[General]
resource-parser = encode(url)
ip-mode = v4-only
dns-server = 223.5.5.5,119.29.29.29
doh3-server = h3://dns.alidns.com/dns-query
allow-wifi-access = false
wifi-access-http-port = 7222
wifi-access-socks5-port = 7221
proxy-test-url = http://1.1.1.1/generate_204
internet-test-url = http://www.apple.com/library/test/success.html
disconnect-on-policy-change = true
test-timeout = 5
domain-reject-mode = DNS
dns-reject-mode = LoopbackIP
sni-sniffing = true
udp-fallback-mode = REJECT
interface-mode = auto
geoip-url = https://gitlab.com/Masaiki/GeoIP2-CN/-/raw/release/Country.mmdb
ipasn-url = https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb

[Proxy]
# 内置 DIRECT、REJECT 策略

[Remote Proxy]

[Remote Filter]
# 节点过滤器 — 根据机场节点名称调整正则
# 排除广告/促销/测速等无用节点
ALL = NameRegex, FilterKey = "(?i)^(?!.*(广告|promo|promote|promotion|test|测速|speedtest|speed|trial|vip|会员|套餐|官网|客服|订阅|流量|到期|更新|频道|group|公告)).+"

HK = NameRegex, FilterKey = "(?i)(🇭🇰|HK|HKG|Hong\s*Kong|香港)"
TW = NameRegex, FilterKey = "(?i)(🇹🇼|TW|TPE|Taiwan|台湾|台灣)"
JP = NameRegex, FilterKey = "(?i)(🇯🇵|JP|TYO|OSA|NRT|HND|KIX|Japan|日本|东京|大阪)"
SG = NameRegex, FilterKey = "(?i)(🇸🇬|SG|SIN|Singapore|新加坡|狮城)"
US = NameRegex, FilterKey = "(?i)(🇺🇸|US|USA|LAX|SJC|SEA|NYC?|JFK|EWR|DAL|ORD|ATL|SFO|United\s*States|美国|美國)"
KR = NameRegex, FilterKey = "(?i)(🇰🇷|KR|ICN|SEL|Korea|Seoul|韩国|韓國)"
EU = NameRegex, FilterKey = "(?i)(🇪🇺|UK|GB|DE|FR|NL|CH|IT|ES|PT|SE|NO|DK|LON|FRA|AMS|PAR|欧洲|欧盟|英国|德国|法国)"
CA = NameRegex, FilterKey = "(?i)(🇨🇦|CA|CAN|YVR|YYZ|YUL|Canada|加拿大)"
AU = NameRegex, FilterKey = "(?i)(🇦🇺|AU|AUS|SYD|MEL|BNE|Australia|澳洲|澳大利亚)"
# 未归类节点
Other = NameRegex, FilterKey = "(?i)^(?!.*(🇭🇰|HK|HKG|香港|🇹🇼|TW|TPE|台湾|台灣|🇯🇵|JP|TYO|OSA|NRT|HND|日本|🇸🇬|SG|SIN|新加坡|🇺🇸|US|USA|LAX|SFO|NYC|JFK|美国|美國|🇰🇷|KR|ICN|SEL|韩国|韓國|🇪🇺|UK|GB|DE|FR|NL|CH|IT|ES|欧洲|🇨🇦|CA|CAN|加拿大|🇦🇺|AU|AUS|澳洲)).+"

[Proxy Group]
# === 手动选择 ===
Proxy = select,Hong Kong,United States,Singapore,Japan,Korea,Taiwan,All-HK-LBHash,All-US-LBHash,All-SG-LBHash,Manual,DIRECT,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Proxy.png
Manual = select,ALL,img-url = gearshape.2

# === 服务策略 ===
AI = select,Proxy,All-US-LBHash,United States,All-SG-LBHash,Singapore,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/ChatGPT.png
Google = select,Proxy,AI,Hong Kong,United States,Japan,Singapore,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png
Telegram = select,Proxy,Hong Kong,Singapore,All-HK-LBHash,All-SG-LBHash,Japan,Manual,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Orz-3/mini/master/Color/Telegram.png
X = select,United States,Singapore,All-US-LBHash,All-SG-LBHash,Manual,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/X.png
Spotify = select,Proxy,Hong Kong,United States,Japan,Singapore,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Spotify.png
PayPal = select,Proxy,Hong Kong,United States,Japan,Singapore,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/PayPal.png
Netflix = select,Proxy,Hong Kong,United States,Japan,Singapore,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Netflix.png
Game = select,Proxy,Hong Kong,United States,Japan,Singapore,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Game.png
Gmedia = select,Proxy,Hong Kong,United States,Japan,Singapore,Korea,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Orz-3/mini/master/Color/Streaming.png

# === 广告拦截 ===
AD = select,REJECT,Proxy,DIRECT,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Advertising.png

# === 兜底 ===
FINAL = select,Proxy,DIRECT,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png

# === 自动测速节点组 ===
Hong Kong = url-test,HK,url = http://latency-test.skk.moe/endpoint,interval = 300,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
Taiwan = url-test,TW,url = http://latency-test.skk.moe/endpoint,interval = 300,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
United States = url-test,US,url = http://latency-test.skk.moe/endpoint,interval = 300,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
Japan = url-test,JP,url = http://latency-test.skk.moe/endpoint,interval = 300,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
Singapore = url-test,SG,url = http://latency-test.skk.moe/endpoint,interval = 300,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
Korea = url-test,KR,url = http://latency-test.skk.moe/endpoint,interval = 300,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png

# === 负载均衡组 (PCC 算法) ===
All-HK-LBHash = load-balance,HK,interval = 600,max-timeout = 3,algorithm = pcc,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
All-US-LBHash = load-balance,US,interval = 600,max-timeout = 3,algorithm = pcc,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
All-SG-LBHash = load-balance,SG,interval = 600,max-timeout = 3,algorithm = pcc,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png

[Proxy Chain]

[Rule]
FINAL,FINAL

